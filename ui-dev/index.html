<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>20 CSS Backgrounds Demo</title>
   <link rel="stylesheet" href="./index.html.css">
    
</head>

<body class="flex-center h-100vh">
    <div class="w-320px h-500px b-1px-s-gray5 m-auto">
        <div class="
        --slide-up:100p --slide-down:--50p --slide-left:--100p --slide-right:100p
        screen-root [w-100p,h-100p,pr,oh]--as-screen-root
        [w-100p,h-100p,pa,inset-0,tp-transform,tdu400ms,ttf-linear]--as-screen
        [class~=is-active][transform-translate-0-0]--as-screen
        --not([class~=is-active])[class~=screen-down][transform-ty-100%]--as-screen
        --not([class~=is-active])[class~=screen-up][transform-ty--100%]--as-screen
        --not([class~=is-active])[class~=screen-right][transform-tx-t100%]--as-screen
        --not([class~=is-active])[class~=screen-left][transform-tx--100%]--as-screen
        --has([class~=screen-up][class~=is-active][class~=screen-transition-push])__[class~=screen-main][tf-ty--push-down]--as-screen-root
        --has([class~=screen-down][class~=is-active][class~=screen-transition-push])__[class~=screen-main]tf-ty--50p--as-screen-root
">
            <div class="
            screen screen-main screen-push --push-down:50% --push-right:50% --push-up:50% --push-left:50%
            --push-right:50px  bgc-red11  "> Main

            </div>
            <div data-slide="push" class="is-active screen  screen-transition-push screen-up height-50p bgc-pink ">Dowm
            
            </div>
            <div class="screen screen-up ">
            
            </div>

        </div>
    </div>
</body>

<script src="./public/js/aliascss.js"></script>
</html>
